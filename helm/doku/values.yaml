nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/dokulabs/ingester
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "0.0.2"
imagePullSecrets: []

service:
  type: LoadBalancer
  port: 9044
  sessionAffinity: None

resources: 
  limits:
    cpu: 1000m
    memory: 1280Mi
  requests:
    cpu: 100m
    memory: 128Mi

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

config:
  existingConfig: false
  filename: "config.yml" # Name of the config file to be created in the configMap
  configMap:
    # If you want to use your own configMap, set existingConfig to true and provide the name of the configMap
    name: ""
    filename: "config.yml" # Name of the config file in the configMap
 
  # Comment out either 'localFile' or 'url' to use only one at a time.  
  pricingInfo:
    # localFile:
    #   path: "../assets/pricing.json" # Path to local JSON file with LLM Pricing data
    url: "https://raw.githubusercontent.com/dokulabs/ingester/main/assets/pricing.json" # URL to download Pricing data file
  
  # Configuration for the Doku Backend Database (TimescaleDB)
  dbConfig:
    name: postgres
    username: admin
    password: &db_password "DOKU"
    host: "{{ .Release.Name }}-db.{{ .Release.Namespace }}.svc.cluster.local"
    port: &db_port "5432"
    sslmode: require
    maxOpenConns: "10"
    maxIdleConns: "10"
    dataTable: DOKU
    apiKeyTable: APIKEY
  
  # Configure Platform to export LLM Observability Data from Doku
  observabilityPlatform:
    enabled: false
    grafanaCloud:
      logsUrl: "https://logs-prod-us-central1.grafana.net"
      logsUsername: "your_loki_username"
      cloudAccessToken: "your_grafana_cloud_api_token"

timescaledb:
  enabled: true
  fullnameOverride: "{{ .Release.Name }}-db"
  secrets:
    credentials:
      PATRONI_admin_PASSWORD: *db_password
  service:
    primary:
      type: LoadBalancer
      port: *db_port
  persistentVolumes:
    data:
      size: 10Gi